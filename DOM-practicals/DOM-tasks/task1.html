<html lang="en">
<head>

<body>
    <h1 id="heading1">this heading is going to be changed</h1>
    <button onclick="changeHeading()">Click this button</button>

        let ElHeading = document.getElementById("heading1")

        function changeHeading() {
            ElHeading.textContent = 'heading changed'
        }
