<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" name="" id="getHere" />
    <h2 id="showHere"></h2>
    <button onclick="clearAll()">clear</button>

    <script>
      let elGetVal = document.getElementById("getHere");
      let elShowVal = document.getElementById("showHere");

      elGetVal.addEventListener("keypress", logKey);

      function logKey() {
        elShowVal.textContent += elGetVal.value;
      }

      function clearAll() {
        elShowVal.textContent = ""
        elGetVal.value = ""
      }
    </script>
  </body>
</html>
