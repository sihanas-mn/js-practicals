<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .apply-cross {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <h1>To-Do List</h1>
    <input type="text" name="" id="inpField" />
    <button onclick="addToList()">add to list</button>
    <ul id="unOrderedList"></ul>

    <script>
      let elUl = document.getElementById("unOrderedList");
      let elInpField = document.getElementById("inpField");

      function addToList() {
        elUl.innerHTML += `<li onclick="lineOver()">${elInpField.value}</li>`;
      }

      function lineOver() {
        var elLi = document.querySelectorAll("li");
        elLi.forEach((element) => {
          element.addEventListener("click", (event) => {
            event.target.classList.toggle("apply-cross")
          })
        });
      }
    </script>
  </body>
</html>
