<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hover-color {
            background-color: blue;
        }
    </style>
</head>
<body>
    

    <script>
        window.addEventListener("mouseover", changeBg)

        function changeBg() {
            document.body.classList.toggle("hover-color")
        }
    </script>
</body>
</html>
