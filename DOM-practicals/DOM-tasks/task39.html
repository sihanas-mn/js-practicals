<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h4>
      You Pressed:
      <h4 id="key-val"></h4>
    </h4>

    <script>
      const elKey = document.getElementById("key-val");


      let keyPressed = null;
      window.addEventListener("keypress", (e) => {
        keyPressed = e.key;
        console.log(keyPressed)
      });

      window.addEventListener("keypress", showKey)

      function showKey() {
        elKey.textContent += keyPressed;
      }
    </script>
  </body>
</html>
