<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="hideContent">This content is going to be hidden</p>
    <button onclick="hideText()">Click to hide</button>
    <script>
        function hideText() {
            let Elpara = document.getElementById("hideContent")
            Elpara.style.display = "none"
        }
    </script>
</body>
</html>
