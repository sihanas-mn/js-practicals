<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="" id="get-name" placeholder="enter your name">
        <input type="number" name="" id="get-age" placeholder="enter your age">
        <input type="text" name="" id="get-course" placeholder="enter the course">
        <button onclick="saveLocal()">click to save</button>
    </form>

    <script>
        const elNameInp = document.getElementById("get-name")
        const elAgeInp = document.getElementById("get-age")
        const elCourseInp = document.getElementById("get-course")

        function saveLocal() {
            localStorage.setItem("name", elNameInp.value)
            localStorage.setItem("age", elAgeInp.value)
            localStorage.setItem("course", elCourseInp.value)
        }
    </script>
</body>
</html>
