<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <p>Please Login with your credentials, <span id="name-here"></span></p>
        <input type="text" name="" id="username" placeholder="enter the username">
        <input type="password" name="" id="password" placeholder="enter the password">
        <button onclick="saveLogin()">Login</button>
    </form>

    <script>
        const elGetUsername = document.getElementById("username")
        const elGetPass = document.getElementById("password")
        const elNameShow = document.getElementById("name-here")

        function saveLogin() {
            localStorage.setItem("username", elGetUsername.value)
        }

        const checkName = localStorage.getItem("username")

        if (checkName !== null) {
            elNameShow.textContent = checkName
        } else {
            elNameShow.textContent = ""
        }

    </script>
</body>
</html>
